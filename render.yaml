services:
  - type: web
    name: creator-rag-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: staging
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_API_KEYS
        sync: false
      - key: USER_API_KEYS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_BACKEND
        value: local
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: VIDEO_CHROMA_PERSIST_DIR
        value: /app/chroma_data
      - key: CHAT_CHECKPOINTER_BACKEND
        value: sqlite
      - key: CHAT_CHECKPOINTER_PATH
        value: data/chat_checkpoints.sqlite
